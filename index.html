<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="viewport">
        <div id="image-container"></div>
    </div>
    <div id="custom-scrollbar-container">
        <div id="custom-scrollbar">
            <div id="custom-scrollbar-handle"></div>
        </div>
    </div>
    <div id="vertical-scrollbar-container">
        <div id="vertical-scrollbar">
            <div id="vertical-scrollbar-handle"></div>
        </div>
    </div>
    <!-- 排版模式切换按钮 -->
    <div id="mode-button" class="action-button" title="切换排版模式 (M)">
        <span class="mode-icon">⇕</span> <!-- 竖排 => 横排 -->
    </div>

    <!-- 主题切换按钮 -->
    <div id="theme-button" class="action-button" title="切换背景颜色 (T)">
        <span class="theme-icon">◐</span>
    </div>

    <!-- 刷新按钮 -->
    <div id="refresh-button" class="action-button" title="刷新图片 (Ctrl+R)">
        <img src="./resources/refresh.png" alt="刷新" />
    </div>

    <!-- 固定按钮 -->
    <div id="pin-button" class="action-button" title="固定窗口 (P)">
        <img src="./resources/pin-deactive.png" alt="固定" />
    </div>

    <script type="module" src="js/plugin.js"></script>
</body>

</html>
